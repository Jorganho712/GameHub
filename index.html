<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Master | 35+ Games</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>ARCADE<span>MASTER</span></h1>
        <p id="game-count">Carregando catálogo...</p>
        <div class="search-box">
            <input type="text" id="search" placeholder="Pesquisar jogo..." onkeyup="filterGames()">

        </div>
    </header>

    <main class="game-grid" id="gameGrid"></main>

    <script src="script.js"></script>
</body>
</html>
